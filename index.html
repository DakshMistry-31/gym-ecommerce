<!DOCTYPE html>
<html>
<head>
  <title>Gym Store</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    input, button {
      margin: 5px;
      padding: 8px;
    }
    .product {
      border: 1px solid #444;
      margin: 10px;
      padding: 10px;
      display: inline-block;
      width: 200px;
    }
    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<h1>💪 Gym Store</h1>

<!-- ADMIN LOGIN -->
<h2>Admin Login</h2>
<input type="password" id="adminCode" placeholder="Enter secret code">
<button onclick="adminLogin()">Login</button>

<div id="adminPanel" style="display:none;">
  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name"><br>
  <input id="price" placeholder="Price"><br>
  <input id="image" placeholder="Image URL"><br>
  <button onclick="addProduct()">Add Product</button>
</div>

<hr>

<h2>Products</h2>
<div id="products"></div>

<script>
  const SECRET_CODE = "1234"; // change this

  function adminLogin() {
    let code = document.getElementById("adminCode").value;
    if (code === SECRET_CODE) {
      document.getElementById("adminPanel").style.display = "block";
      alert("Admin logged in");
    } else {
      alert("Wrong code");
    }
  }

  function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let image = document.getElementById("image").value;

    let products = JSON.parse(localStorage.getItem("products")) || [];

    products.push({ name, price, image });

    localStorage.setItem("products", JSON.stringify(products));

    alert("Product added!");
    loadProducts();
  }

  function loadProducts() {
    let products = JSON.parse(localStorage.getItem("products")) || [];

    document.getElementById("products").innerHTML = products.map((p, i) => `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="buyProduct(${i})">Buy</button>
      </div>
    `).join("");
  }

  function buyProduct(index) {
    let products = JSON.parse(localStorage.getItem("products"));
    let product = products[index];

    alert("Order placed for " + product.name);
  }

  loadProducts();
</script>

</body>
</html>
